version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies...
      - yum install -y python3 python3-pip
  build:
    commands:
      - echo Building the application...
      - python3 -m pip install -r requirements.txt
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Packaging the application...
artifacts:
  files:
    - app.py
    - requirements.txt
    - appspec.yml
    - scripts/**/*